{% extends 'base.html' %}
{% block title %}Stok Kartlari{% endblock %}
{% block content %}
<h1>Stok Kartları</h1>
<table class="table table-striped">
<thead><tr><th>Kod</th><th>Adı</th><th>Birim</th></tr></thead>
<tbody>
{% for i in items %}
<tr><td>{{ i.StokKodu }}</td><td>{{ i.UrunAdi }}</td><td>{{ i.Birim }}</td></tr>
{% endfor %}
</tbody>
</table>
{% endblock %}
